# owncord-pundef.mooo.com — reverse proxy to OwnCord LXC (192.168.50.36:3001).
# Socket.IO needs WebSocket upgrade (same pattern as apps-pundef / Beszel).
# Mirror to /etc/apache2/sites-available/owncord-pundef.conf on nextcloud-vm (101).
# TLS: Let's Encrypt (certbot webroot). Issued via owncord/scripts/proxmox/le-cert.sh

<VirtualHost *:80>
    ServerName owncord-pundef.mooo.com
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]

    ErrorLog ${APACHE_LOG_DIR}/owncord-pundef-error.log
    CustomLog ${APACHE_LOG_DIR}/owncord-pundef-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName owncord-pundef.mooo.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/owncord-pundef.mooo.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/owncord-pundef.mooo.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    <IfModule mod_headers.c>
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        Header always set X-Frame-Options "DENY"
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 3600

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "owncord-pundef.mooo.com"

    # Large uploads (voice/files); keep in sync with MAX_UPLOAD_MB on OwnCord server.
    LimitRequestBody 629145600

    RewriteEngine On
    RewriteCond %{HTTP:Connection} Upgrade [NC]
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule ^/(.*) "ws://192.168.50.36:3001/$1" [P,L]

    ProxyPass        / http://192.168.50.36:3001/
    ProxyPassReverse / http://192.168.50.36:3001/

    ErrorLog ${APACHE_LOG_DIR}/owncord-pundef-error.log
    CustomLog ${APACHE_LOG_DIR}/owncord-pundef-access.log combined
</VirtualHost>
