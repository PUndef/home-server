<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>phoneserver chat</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --user: #1e3a5f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { margin: 0; font-size: 1rem; font-weight: 600; }
    header .meta { font-size: 0.8rem; color: var(--muted); }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg {
      max-width: 42rem;
      padding: 0.65rem 0.85rem;
      border-radius: 0.65rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user { align-self: flex-end; background: var(--user); }
    .msg.assistant { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
    .msg.system { align-self: center; color: var(--muted); font-size: 0.85rem; }
    form {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }
    textarea {
      flex: 1;
      resize: vertical;
      min-height: 2.5rem;
      max-height: 8rem;
      padding: 0.55rem 0.7rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    button {
      padding: 0.55rem 1rem;
      border: none;
      border-radius: 0.5rem;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #stop { background: #5c3d3d; display: none; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>phoneserver chat</h1>
      <div class="meta">Qwen2.5-3B via llama-server · stream</div>
    </div>
    <div class="meta" id="status">ready</div>
  </header>
  <div id="log" aria-live="polite"></div>
  <form id="form">
    <textarea id="input" rows="2" placeholder="Сообщение…" autocomplete="off"></textarea>
    <button type="submit" id="send">Send</button>
    <button type="button" id="stop">Stop</button>
  </form>
  <script>
    const MODEL = "qwen2.5-3b";
    const logEl = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const stopBtn = document.getElementById("stop");
    const statusEl = document.getElementById("status");

    const chatPrefix = (() => {
      const p = location.pathname.replace(/\/index\.html$/, "").replace(/\/$/, "");
      if (p.endsWith("/chat") || p === "/chat") return "/chat";
      const i = p.indexOf("/chat");
      return i >= 0 ? p.slice(0, i + 5) : "/chat";
    })();

    const API_URL = `${location.origin}${chatPrefix}/llm/v1/chat/completions`;
    const messages = [];

    let abortController = null;

    function setStatus(t) { statusEl.textContent = t; }

    function append(role, text) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = text;
      logEl.appendChild(el);
      logEl.scrollTop = logEl.scrollHeight;
      return el;
    }

    function parseSseChunk(block) {
      for (const line of block.split("\n")) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") return null;
        try {
          const j = JSON.parse(data);
          return j.choices?.[0]?.delta?.content ?? "";
        } catch { /* skip */ }
      }
      return "";
    }

    async function streamChat(userText) {
      messages.push({ role: "user", content: userText });
      append("user", userText);
      const assistantEl = append("assistant", "");
      let full = "";

      abortController = new AbortController();
      stopBtn.style.display = "inline-block";
      sendBtn.disabled = true;
      setStatus("generating…");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: MODEL,
            messages,
            stream: true,
            max_tokens: 512,
          }),
          signal: abortController.signal,
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`HTTP ${res.status}: ${errText.slice(0, 200)}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop() ?? "";
          for (const part of parts) {
            const delta = parseSseChunk(part);
            if (delta === null) break;
            if (delta) {
              full += delta;
              assistantEl.textContent = full;
              logEl.scrollTop = logEl.scrollHeight;
            }
          }
        }

        messages.push({ role: "assistant", content: full });
        setStatus("ready");
      } catch (e) {
        if (e.name === "AbortError") {
          assistantEl.textContent = full || "(stopped)";
          if (full) messages.push({ role: "assistant", content: full });
          setStatus("stopped");
        } else {
          assistantEl.textContent = `Error: ${e.message}`;
          setStatus("error");
        }
      } finally {
        abortController = null;
        stopBtn.style.display = "none";
        sendBtn.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || abortController) return;
      input.value = "";
      streamChat(text);
    });

    stopBtn.addEventListener("click", () => abortController?.abort());

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    append("system", `API: ${API_URL}`);
  </script>
</body>
</html>
