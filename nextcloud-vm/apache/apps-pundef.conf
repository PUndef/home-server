# Stage 2: full vhost for apps-pundef.mooo.com.
# :80 -> redirect to https + keep ACME challenge local for certbot renew.
# :443 -> reverse proxy to static-sites Caddy LXC (192.168.50.35).
#
# Beszel hub (under /beszel/) needs WebSocket upgrades for agent <-> hub
# heartbeat and UI realtime updates. We use mod_proxy_wstunnel to forward
# upgraded connections; non-upgraded HTTP keeps going through ProxyPass.
#
# Required modules: proxy, proxy_http, proxy_wstunnel, rewrite, headers,
# ssl. All are stock in Debian 12 and enabled via a2enmod.
#
# Live source of truth: this file is mirrored to
#   /etc/apache2/sites-available/apps-pundef.conf
# on nextcloud-vm (101). See beszel-monitoring-setup.md, Step 6/7.

<VirtualHost *:80>
    ServerName apps-pundef.mooo.com
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]

    ErrorLog ${APACHE_LOG_DIR}/apps-pundef-error.log
    CustomLog ${APACHE_LOG_DIR}/apps-pundef-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName apps-pundef.mooo.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/apps-pundef.mooo.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/apps-pundef.mooo.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    <IfModule mod_headers.c>
        Header always set Strict-Transport-Security "max-age=15552000; includeSubDomains"
    </IfModule>

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "apps-pundef.mooo.com"

    # WebSocket upgrade. Apache evaluates RewriteRule before ProxyPass, so
    # any request with `Connection: Upgrade` and `Upgrade: websocket` gets
    # forwarded as ws:// to the static-sites Caddy. Non-WS traffic falls
    # through to the regular ProxyPass below.
    RewriteEngine On
    RewriteCond %{HTTP:Connection} Upgrade [NC]
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule ^/(.*) "ws://192.168.50.35/$1" [P,L]

    ProxyPass        / http://192.168.50.35/
    ProxyPassReverse / http://192.168.50.35/

    ErrorLog ${APACHE_LOG_DIR}/apps-pundef-error.log
    CustomLog ${APACHE_LOG_DIR}/apps-pundef-access.log combined
</VirtualHost>
